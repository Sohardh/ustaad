spring.application.name=backend
spring.ai.google.genai.api-key:${GEMINI_API_KEY}
spring.ai.google.genai.model:gemini-2.5-pro   # or gemini-1.5-pro-002 ? use whatever your work account gives
spring.ai.vector-store.type:simple   # 100% local file-based vector store (no extra DB)
wiki.base-path:${user.home}/wiki-work/wiki
wiki.sources-path:${user.home}/wiki-work/sources
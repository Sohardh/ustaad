spring.application.name=ustad-backend
# LLM provider: ollama (default) or gemini
wiki.llm-provider=gemini
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.1:8b
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=gemini-3.1-pro-preview
wiki.base-path=${WIKI_BASE_PATH}
wiki.sources-path=${WIKI_SOURCES_PATH}
wiki.watchers-path=watchers.json
wiki.watchers-state-path=watchers-state.json
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB